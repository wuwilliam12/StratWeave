# Frontend: lint + unit tests. Extend with build, e2e, or deploy jobs as needed.
name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/strategy-weave/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/strategy-weave/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/strategy-weave

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/strategy-weave/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # Optional: uncomment when you want CI to enforce production builds.
      # - name: Build
      #   run: npm run build
